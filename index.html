<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <script>
      // Apply the saved/system theme before first paint to avoid a flash of
      // the wrong theme. Mirrors src/utils/theme.ts, which takes over on boot.
      ;(function () {
        try {
          var pref = localStorage.getItem('gas-tracker-theme')
          var dark =
            pref === 'dark' ||
            (pref !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute('content', dark ? '#09090b' : '#f2f2f7')
        } catch (e) {}
      })()
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gas Tracker" />
    <title>Gas Tracker</title>
  </head>
  <body class="bg-app text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
